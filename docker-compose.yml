version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Aici încărcăm scriptul care creează tabelele automat la prima pornire
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./src:/app/src # Asta ne permite să modificăm codul de pe Mac și să se actualizeze în container

volumes:
  postgres_data:
