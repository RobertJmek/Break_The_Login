<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creează Tichet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0275d8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #025aa5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Creează un Tichet Nou</h2>
        <form action="/ticket" method="POST">
            <label for="title">Titlu Tichet:</label>
            <input type="text" id="title" name="title" required placeholder="Titlu scurt...">

            <label for="description">Descriere:</label>
            <textarea id="description" name="description" rows="5" required placeholder="Descrie problema ta aici..."></textarea>

            <label for="priority">Prioritate / Severitate:</label>
            <select id="priority" name="priority" required>
                <option value="LOW">Scăzută</option>
                <option value="MEDIUM" selected>Medie</option>
                <option value="HIGH">Ridicată</option>
            </select>

            <button type="submit">Trimite Tichet</button>
        </form>
    </div>
</body>

</html>
