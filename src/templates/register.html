<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deskly - Înregistrare (Vulnerabil)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #c9302c;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Creare Cont Deskly</h2>
        <form action="/register" method="POST">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="nume@exemplu.com">

            <label for="password">Parolă:</label>
            <input type="password" id="password" name="password" required placeholder="Parolă">

            <button type="submit">Înregistrare</button>
        </form>
    </div>
</body>

</html>
